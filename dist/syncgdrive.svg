        </text>
        <text x="128" y="170" font-family="sans-serif" font-weight="900" font-size="68" text-anchor="middle"
              fill="none" stroke="#000000" filter="url(#dropShadow)" letter-spacing="-2" opacity="0.4" stroke-width="1">
            SGD
        </text>
    </g>


    <ellipse cx="75" cy="60" rx="35" ry="2" fill="#ffffff" stroke-width="2" opacity="0.19"/>
    <ellipse cx="67" cy="132" rx="2" ry="4" fill="#ffffff" stroke-width="2" opacity="1" transform="rotate(45,67,132)"/>
    <ellipse cx="112" cy="132" rx="2" ry="4" fill="#ffffff" stroke-width="2" opacity="1" transform="rotate(45,112,132)"/>
    <ellipse cx="161" cy="132" rx="2" ry="4" fill="#ffffff" stroke-width="2" opacity="1" transform="rotate(45,161,132)"/>

