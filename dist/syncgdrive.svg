        />
    </g>
    <g filter="url(#dropShadow)">
        <ellipse cx="128" cy="146" rx="90" ry="44"
                 fill="#ffffff" stroke="darkblue" stroke-width="2" filter="url(#dropShadow)" opacity="0.85"/>
        <text x="128" y="170" font-family="sans-serif" font-weight="900" font-size="68" text-anchor="middle"
              fill="url(#gdriveGrad)" filter="url(#dropShadow)" letter-spacing="-2">
