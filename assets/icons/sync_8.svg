<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <defs>
        <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#42A5F5"/>
            <stop offset="100%" stop-color="#1565C0"/>
        </linearGradient>

        <linearGradient id="syncArrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="50%" stop-color="#D1D9E0"/>
            <stop offset="100%" stop-color="#A9D0F5"/>
        </linearGradient>

        <linearGradient id="syncTopArrowHighlightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
        </linearGradient>

        <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="1.5" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.2"/>
        </filter>
    </defs>

    <g transform="scale(1.18) translate(-1.8, -1)">
        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"
              fill="url(#folderGrad)"
              filter="url(#dropShadow)"/>
    </g>

    <g filter="url(#dropShadow)" transform="rotate(315, 12, 14.5)">
        <g transform="translate(12, 13) scale(0.65)">
            <g fill="none">

                <g>
                    <path d="M -8 8 q 8 9 16 0" fill="none" stroke="url(#syncArrowGrad)" stroke-width="3" stroke-linecap="round"/>
                    <polyline points="-12,12 -10,4.5 -1.5,6.5" fill="none" stroke="url(#syncArrowGrad)" stroke-width="3" stroke-linecap="round"/>
                </g>

                <g transform="rotate(180, 0, 2)">
                    <path d="M -8 8 q 8 9 16 0" fill="none" stroke="url(#syncArrowGrad)" stroke-width="3" stroke-linecap="round"/>
                    <polyline points="-12,12 -10,4.5 -1.5,6.5" fill="none" stroke="url(#syncArrowGrad)" stroke-width="3" stroke-linecap="round"/>

                    <path d="M -8 8 q 8 9 16 0" fill="none" stroke="url(#syncTopArrowHighlightGrad)" stroke-width="3" stroke-linecap="round"/>
                    <polyline points="-12,12 -10,4.5 -1.5,6.5" fill="none" stroke="url(#syncTopArrowHighlightGrad)" stroke-width="3" stroke-linecap="round"/>
                </g>

            </g>
        </g>
